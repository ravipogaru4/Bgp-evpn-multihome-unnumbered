network:
  version: 2
  renderer: networkd

  # 1. Underlay Physical Data Plane Cables
  ethernets:
    ens160:
      dhcp4: true
    ens161:
      dhcp4: false
    ens256:
      dhcp4: false

  # 2. Virtual Routing and Forwarding Isolation Chamber (Table 4)
  vrfs:
    vrf1:
      table: 4
      interfaces: [br10, br20, br50000]

  # 3. Layer 2 Bridge Domains
  bridges:
    br10:
      macaddress: 00:00:5e:00:01:10
      addresses:
        - 10.1.10.1/24
    br20:
      macaddress: 00:00:5e:00:01:20
      addresses:
        - 10.1.20.1/24
    br50000:
      interfaces: [vxlan50000]   
      macaddress: b6:c7:42:55:d6:c9  
      addresses:
        - 10.254.254.1/30

  # 4. Virtual Tunnel Enclosures (VXLAN Overlays Only)
  tunnels:
    vxlan50000:
      mode: vxlan
      id: 50000
      port: 4789
      local: 11.11.11.11         
    vxlan10:
      mode: vxlan
      id: 10010
      port: 4789
      local: 11.11.11.11
    vxlan20:
      mode: vxlan
      id: 10020
      port: 4789
      local: 11.11.11.11
