!
frr version 10.6.1
frr defaults traditional
hostname leaf-1
service integrated-vtysh-config
!
vrf vrf1
 vni 50000
exit-vrf
!
router bgp 65001
 bgp router-id 11.11.11.11
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp bestpath as-path ignore
 !
 neighbor SPINE-OVERLAY peer-group
 neighbor SPINE-OVERLAY remote-as 65000
 neighbor SPINE-OVERLAY ebgp-multihop 5
 neighbor SPINE-OVERLAY update-source lo
 !
 neighbor SPINE-UNDERLAY peer-group
 neighbor SPINE-UNDERLAY remote-as 65000
 !
 neighbor 1.1.1.1 peer-group SPINE-OVERLAY
 neighbor 2.2.2.2 peer-group SPINE-OVERLAY
 neighbor ens161 interface peer-group SPINE-UNDERLAY
 no neighbor ens161 capability link-local
 neighbor ens256 interface peer-group SPINE-UNDERLAY
 no neighbor ens256 capability link-local
 !
 address-family ipv4 unicast
  network 11.11.11.11/32
  neighbor SPINE-UNDERLAY activate
  neighbor SPINE-UNDERLAY allowas-in
  import vrf vrf1
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor SPINE-OVERLAY activate
  neighbor SPINE-OVERLAY allowas-in 2
  advertise-all-vni
  !
  vni 10010
   rd 11.11.11.11:10010
   route-target import 65001:10010
   route-target export 65001:10010
  exit-vni
  !
  vni 10020
   rd 11.11.11.11:10020
   route-target import 65001:10020
   route-target export 65001:10020
  exit-vni
 exit-address-family
exit
!
router bgp 65001 vrf vrf1
 bgp router-id 11.11.11.11
 bgp bestpath as-path ignore
 !
 address-family ipv4 unicast
  redistribute connected
  import vrf default
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 11.11.11.11:50000
  route-target import 65001:50000
  route-target export 65001:50000
  neighbor SPINE-OVERLAY allowas-in 2
 exit-address-family
exit
!
end

